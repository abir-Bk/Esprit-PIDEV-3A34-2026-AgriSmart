security:
    enable_authenticator_manager: true

    password_hashers:
        App\Entity\User: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        # ────────────────────────────────────────────────
        # Web firewall – session + CSRF + forms
        # ────────────────────────────────────────────────
        web:
            pattern: ^/(?!api)               # everything except /api
            lazy: true
            provider: app_user_provider

            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: /dashboard

            logout:
                path: app_logout
                target: app_home

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 2592000           # 30 days
                path: /
                name: REMEMBERME            # optional - custom name

        # ────────────────────────────────────────────────
        # API firewall – stateless JWT (no session, no CSRF)
        # ────────────────────────────────────────────────
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~
            # Optional: allow json login to generate token
            json_login:
                check_path:       api_login
                username_path:    email
                password_path:    password
                success_handler:  lexik_jwt_authentication.handler.authentication_success
                failure_handler:  lexik_jwt_authentication.handler.authentication_failure

    access_control:
        # Public API routes (no auth needed)
        - { path: ^/api/(login|register|forgot-password|reset-password|refresh), roles: PUBLIC_ACCESS }

        # Protected API routes
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

        # Web routes – session-based
        - { path: ^/(dashboard|profile|admin|cart), roles: ROLE_USER }
        - { path: ^/admin, roles: ROLE_ADMIN }