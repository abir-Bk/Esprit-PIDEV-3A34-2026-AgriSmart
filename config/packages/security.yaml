security:
    enable_authenticator_manager: true

    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        api:
            pattern: ^/api
            stateless: true
            jwt: ~
        main:
            lazy: true
            provider: app_user_provider
            logout:
                path: app_logout
                target: /login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
            custom_authenticators:
                - App\Security\LoginFormAuthenticator
                #- App\Security\GoogleAuthenticator
            entry_point: App\Security\LoginFormAuthenticator   # <-- This tells Symfony to redirect to the login form
            user_checker: App\Security\AccountStatusChecker
    access_control:
        - { path: ^/admin/offre, roles: [ROLE_ADMIN, ROLE_AGRICULTEUR] }
        - { path: ^/admin/offres$, roles: [ROLE_ADMIN, ROLE_AGRICULTEUR] }
        - { path: ^/admin/liste-offres, roles: ROLE_ADMIN }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/back/admin, roles: ROLE_ADMIN }
        - { path: ^/semi-public/users, roles: [ROLE_AGRICULTEUR, ROLE_EMPLOYEE, ROLE_FOURNISSEUR] }  
        - { path: ^/semi-public/checkout, roles: ROLE_USER }
        - { path: ^/semi-public/commande, roles: ROLE_USER }      