vich_uploader:
    db_driver: orm
    mappings:
        user_documents:
            uri_prefix: /uploads/users/documents
            upload_destination: '%kernel.project_dir%/public/uploads/users/documents'
            namer: Vich\UploaderBundle\Naming\UniqidNamer   # or SmartUniqueNamer, PropertyNamer...
        user_images:
            uri_prefix: /uploads/users/images
            upload_destination: '%kernel.project_dir%/public/uploads/images'
            namer: Vich\UploaderBundle\Naming\UniqidNamer